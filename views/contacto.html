<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUVIA - Contacto</title>
<link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <main class="mobile-wrapper">
    <section class="card register-card">
      <div class="logo-box">
        <img src="../assets/img/logo_nuvia.png" alt="Logo NUVIA" class="logo">
      </div>

      <h1 class="title">Contacta con nosotros</h1>

      <form id="contactForm" class="form">
        <div class="form-group">
          <label for="contact-name-field">Nombre</label>
          <input type="text" id="contact-name-field" name="contact-name" required aria-required="true" minlength="2">
        </div>

        <div class="form-group">
          <label for="contact-email-field">Email</label>
          <input type="email" id="contact-email-field" name="contact-email" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="contact-subject-field">Asunto</label>
          <input type="text" id="contact-subject-field" name="contact-subject" required aria-required="true" minlength="3">
        </div>

        <div class="form-group">
          <label for="contact-message-field">Mensaje</label>
          <textarea id="contact-message-field" name="contact-message" rows="5" required aria-required="true" minlength="10"></textarea>
        </div>

        <button type="submit" class="btn-primary">Enviar</button>
      </form>
<br>
      <p class="bottom-text">
        <a href="login.html">Volver al inicio</a>
      </p>
    </section>
  </main>

  <script src="../src/validaciones.js"></script>
</body>
</html>
