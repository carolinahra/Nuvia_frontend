<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUVIA - Contacto</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="page-bg">

  <main class="mobile-wrapper">
    <section class="card">
      <div class="logo-box">
        <img src="../assets/img/logo_nuvia.png" alt="Logo NUVIA" class="logo">
      </div>

      <h1 class="title">Contacta con nosotros</h1>

      <form id="contactForm" class="form">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" required aria-required="true" minlength="2">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="correo" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="asunto">Asunto</label>
          <input type="text" id="asunto" name="asunto" required aria-required="true" minlength="3">
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" name="mensaje" rows="5" required aria-required="true" minlength="10"></textarea>
        </div>

        <button type="submit" class="btn-primary">Enviar</button>
      </form>

      <p class="bottom-text">
        <a href="login.html">Volver al inicio</a>
      </p>
    </section>
  </main>

  <script src="../assets/js/validaciones.js"></script>
</body>
</html>
