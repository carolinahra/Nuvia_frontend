<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUVIA - Inicio</title>
 <link rel="stylesheet" href="../assets/styles.css">
</head>
<body class="page-bg">

  <main class="mobile-wrapper">
    <section class="card">
      <div class="logo-box">
        <img src="../assets/img/logo_nuvia_nombre.png" alt="Logo NUVIA" class="logo">
      </div>

      <h1 class="title">Inicia sesión en tu cuenta</h1>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" required aria-required="true" minlength="6">
        </div>

        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>

      <p class="bottom-text">
        ¿Necesitas ayuda? <a href="contacto.html">Contacta con nosotros</a>
      </p>
    </section>
  </main>

  <script src="../assets/js/validaciones.js"></script>
</body>
</html>
