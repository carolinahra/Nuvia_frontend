<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú - Nuvia</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <div class="mobile-wrapper">
    <main class="card menu-card">

      <section class="menu-top-strip">
        <header class="menu-header">
          <div class="menu-header-top">
            <img src="../assets/img/logo_nuvia.png" alt="Logo Nuvia" class="menu-logo">
            <button class="logout-btn" type="button" aria-label="Cerrar sesión">↪</button>
          </div>
          <p class="menu-user">Hola, Usuario_Nuvia</p>
        </header>
      </section>

      <section class="menu-title-zone">
        <h1 class="menu-title">Tu Centro de Bienestar</h1>
        <p class="menu-subtitle">Selecciona una sección</p>
      </section>

      <section class="menu-content-zone">
        <section class="menu-grid">
          <div class="menu-item">
            <img src="../assets/img/iconoMenu_alimentacion.png" alt="Alimentación" class="menu-item-icon">
          </div>

          <div class="menu-item">
            <img src="../assets/img/iconoMenu_entrenamiento.png" alt="Entrenamiento" class="menu-item-icon">
          </div>

          <div class="menu-item">
            <img src="../assets/img/iconoMenu_miperfil.png" alt="Mi Perfil" class="menu-item-icon">
          </div>

          <div class="menu-item">
            <img src="../assets/img/iconoMenu_estadisticas.png" alt="Estadísticas" class="menu-item-icon">
          </div>
        </section>
      </section>

    </main>
  </div>

</body>
</html>
