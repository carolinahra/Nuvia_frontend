<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú - Nuvia</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <div class="mobile-wrapper">
    <main class="card menu-card">

      <section class="menu-top-strip">
        <header class="menu-header">
          <div class="menu-header-top">
            <img src="../assets/img/logo_nuvia.png" alt="Logo Nuvia" class="menu-logo">
            <button class="logout-btn" id="logout-btn" type="button" aria-label="Cerrar sesión">↪</button>
          </div>
          <p class="menu-user" id="greeting-name">Hola, Usuario_Nuvia</p>
        </header>
      </section>

      <section class="menu-title-zone">
        <h1 class="menu-title">Tu Centro de Bienestar</h1>
        <p class="menu-subtitle">Selecciona una sección</p>
      </section>

      <section class="menu-content-zone">
        <section class="menu-grid">

  <a href="alimentacion.html" class="menu-item" data-section="alimentacion" aria-label="Ir a Alimentación">
    <img src="../assets/img/iconoMenu_alimentacion.png" alt="Alimentación" class="menu-item-icon">
  </a>

  <a href="entrenamiento.html" class="menu-item" data-section="entrenamiento" aria-label="Ir a Entrenamiento">
    <img src="../assets/img/iconoMenu_entrenamiento.png" alt="Entrenamiento" class="menu-item-icon">
  </a>

  <a href="perfil.html" class="menu-item" data-section="perfil" aria-label="Ir a Mi Perfil">
    <img src="../assets/img/iconoMenu_miperfil.png" alt="Mi Perfil" class="menu-item-icon">
  </a>

  <a href="estadisticas.html" class="menu-item" data-section="estadisticas" aria-label="Ir a Estadísticas">
    <img src="../assets/img/iconoMenu_estadisticas.png" alt="Estadísticas" class="menu-item-icon">
  </a>

</section>
      </section>

    </main>
  </div>

  <script type="module">
    import { Container } from '../src/container.js';
    const container = new Container({ http: { url: import.meta.env.VITE_BACKEND_ENDPOINT } });
    container.userController.init();
  </script>

</body>
</html>
