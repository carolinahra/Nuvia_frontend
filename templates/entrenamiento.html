<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrenamiento - Nuvia</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <div class="mobile-wrapper">
    <main class="card entrenamiento-card">

      <section class="entrenamiento-header">
        <button class="entrenamiento-back-btn" type="button" aria-label="Volver">
          ←
        </button>

        <div class="entrenamiento-title-box">
          <h1 class="entrenamiento-title">Entrenamiento</h1>
          <p class="entrenamiento-subtitle">Elige tu entrenamiento</p>
        </div>

        <img src="../assets/img/logo_nuvia.png" alt="Logo Nuvia" class="entrenamiento-logo">
      </section>

      <section class="entrenamiento-content">

        <section class="entrenamiento-plan-box">

          <div class="entrenamiento-plan-header">
            <span class="entrenamiento-plan-icon">🏋️</span>
            <h2 class="entrenamiento-plan-title">Selecciona una rutina</h2>
          </div>

          <div class="entrenamiento-select-box">
            <label for="tipoEntrenamiento" class="entrenamiento-select-label">
              Tipo de entrenamiento
            </label>
            <select id="tipoEntrenamiento" class="entrenamiento-select">
              <option value="">Selecciona una opción</option>
            </select>
          </div>

          <div class="entrenamiento-rutina-info" id="trainingRoutineInfo">
            <h3 class="entrenamiento-rutina-title">Rutina seleccionada</h3>
            <span class="entrenamiento-duration">0 min</span>
          </div>

          <div class="entrenamiento-exercises-list" id="trainingExercisesList"></div>

          <button class="entrenamiento-start-btn" type="button">
            Rutina realizada
          </button>

        </section>

      </section>

    </main>
  </div>

  <script type="module">
    import { Container } from '../src/container.js';
    const container = new Container({ http: { url: import.meta.env.VITE_BACKEND_ENDPOINT } });
    container.entrenamientoController.init();
  </script>

</body>
</html>
