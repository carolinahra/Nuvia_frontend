<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Perfil - Nuvia</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <div class="mobile-wrapper">
    <main class="card perfil-card">

      <section class="perfil-header">
        <button class="perfil-back-btn" type="button" aria-label="Volver">
          ←
        </button>

        <div class="perfil-title-box">
          <h1 class="perfil-title">Mi Perfil</h1>
          <p class="perfil-subtitle">Tu información personal</p>
        </div>

        <img src="../assets/img/logo_nuvia.png" alt="Logo Nuvia" class="perfil-logo">
      </section>

      <section class="perfil-content">

        <a href="editar-perfil.html" class="perfil-option">
          <div class="perfil-option-icon">
            ⚙
          </div>

          <div class="perfil-option-text">
            <h2>Editar Perfil</h2>
            <p>Actualiza tus datos y objetivos</p>
          </div>
        </a>

        <a href="ingesta-calorica.html" class="perfil-option">
          <div class="perfil-option-icon">
            🍽️
          </div>

          <div class="perfil-option-text">
            <h2>Calcular Ingesta Calórica</h2>
            <p>Determina tus calorías diarias</p>
          </div>
        </a>

      </section>

    </main>
  </div>

</body>
</html>
