<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Calórica - Nuvia</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <div class="mobile-wrapper">
    <main class="card ingesta-card">

      <section class="ingesta-header">
        <button class="ingesta-back-btn" type="button" aria-label="Volver">
          ←
        </button>

        <div class="ingesta-title-box">
          <h1 class="ingesta-title">Calculadora Calórica</h1>
          <p class="ingesta-subtitle">Calcula tus calorías</p>
        </div>

        <img src="../assets/img/logo_nuvia.png" alt="Logo Nuvia" class="ingesta-logo">
      </section>

      <section class="ingesta-content">

        <section class="ingesta-box">

          <div class="ingesta-box-header">
            <div class="ingesta-box-icon">
              🔢
            </div>

            <h2 class="ingesta-box-title">Ingesta Diaria</h2>
          </div>

          <!-- 
            Div para tu superformulario JS
          -->
          <div class="ingesta-form-container" id="ingestaFormContainer"></div>

        </section>

      </section>

    </main>
  </div>

</html>
