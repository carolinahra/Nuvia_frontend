<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NUVIA - Inicio</title>
 <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body class="page-bg">

  <main class="mobile-wrapper">
    <section class="card register-card">
      <div class="logo-box">
        <img src="../assets/img/logo_nuvia_nombre.png" alt="Logo NUVIA" class="logo">
      </div>

      <h1 class="title">Inicia sesión en tu cuenta</h1>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="login-email-field">Email</label>
          <input type="email" id="login-email-field" name="login-email" required aria-required="true">
        </div>

        <div class="form-group">
          <label for="login-password-field">Contraseña</label>
          <input type="password" id="login-password-field" name="login-password" required aria-required="true" minlength="6">
        </div>

        <button type="submit" class="btn-primary">Iniciar sesión</button>
      </form>
      <br>

      <p class="bottom-text">
        ¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a>
        </p>

      <p class="bottom-text">
        ¿Necesitas ayuda? <a href="contacto.html">Contacta con nosotros</a>
      </p>
    </section>
  </main>

  <script type="module">
    import { Container } from '../src/container.js';

    const container = new Container({ http: { url: import.meta.env.VITE_BACKEND_ENDPOINT } });
    container.loginController.init();
  </script>
</body>
</html>
